<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <title>Szoba Chat</title>
    <!-- <link rel="stylesheet" href="../frontend/style.css"> -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- <script src="../frontend/script.js" defer></script> -->
    <style>
      td {
        width: 100px;
        height: 100px;
        margin: 5px;
		background-color: lightgray;
      }
    </style>
</head>
<body>
	<main>
		<h2>Szoba létrehozása</h2>
		<input id="newRoom" placeholder="Szoba neve" value="1">
		<input id="newPassword" placeholder="Jelszó" value="1">
		<button id="createBtn">Létrehoz</button>
	
		<h2>Csatlakozás meglévő szobához</h2>
		<input id="joinRoom" placeholder="Szoba neve" />
		<input id="joinPassword" placeholder="Jelszó" />
		<button id="joinBtn">Csatlakozás</button>
	</main>

    <div id="chatArea" style="display: none">
		<h3>Szoba: <span id="roomTitle"></span></h3>
		<table>
			<tr>
				<td data-row="0" data-column="0"></td>
				<td data-row="0" data-column="1"></td>
				<td data-row="0" data-column="2"></td>
			</tr>
			<tr>
				<td data-row="1" data-column="0"></td>
				<td data-row="1" data-column="1"></td>
				<td data-row="1" data-column="2"></td>
			</tr>
			<tr>
				<td data-row="2" data-column="0"></td>
				<td data-row="2" data-column="1"></td>
				<td data-row="2" data-column="2"></td>
			</tr>
		</table>
    </div>

    <script>
		const socket = io();

		let currentRoom = "";

		document.getElementById("createBtn").onclick = () => {
			const roomName = document.getElementById("newRoom").value;
			const password = document.getElementById("newPassword").value;
			socket.emit("createRoom", { roomName, password }, (res) => {
			if (res.success) joinRoom(roomName, password);
			else alert(res.message);
			});
		};

		document.getElementById("joinBtn").onclick = () => {
			const roomName = document.getElementById("joinRoom").value;
			const password = document.getElementById("joinPassword").value;
			joinRoom(roomName, password);
		};

		function joinRoom(roomName, password) {
			socket.emit("joinRoom", { roomName, password }, (res) => {
			if (res.success) {
				currentRoom = roomName;
				document.getElementById("chatArea").style.display = "block";
				document.querySelector("main").style.display = "none"
				document.getElementById("roomTitle").innerText = roomName;
			} else {
				alert(res.message);
			}
			});
		}

		document.querySelectorAll("td").forEach(td => {
			td.addEventListener("click", lerak);
		});

		function lerak(e) {
			const td = e.target;
			console.log(td.dataset.row, td.dataset.column);
		}

		socket.on("chatMessage", ({ textarea, message }) => {
			const ta = document.getElementById(textarea);
			ta.value += message + "\n";
		});
    </script>
</body>
</html>
